appId: com.meld.desktop
productName: Meld
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
protocols:
  - name: Meld
    schemes:
      - meld
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: "Meld-${version}.${ext}"
dmg:
  background: resources/dmg-background.png
  window:
    width: 660
    height: 400
  contents:
    - x: 180
      y: 170
      type: file
    - x: 480
      y: 170
      type: link
      path: /Applications
win:
  target:
    - nsis
  artifactName: "Meld-Setup-${version}.${ext}"
linux:
  target:
    - AppImage
  category: Development
  artifactName: "Meld-${version}.${ext}"
publish:
  provider: github
  owner: Noah1206
  repo: meld
