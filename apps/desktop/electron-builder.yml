appId: com.meld.desktop
productName: Meld
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: "Meld-${version}.${ext}"
win:
  target:
    - nsis
  artifactName: "Meld-Setup-${version}.${ext}"
linux:
  target:
    - AppImage
  category: Development
  artifactName: "Meld-${version}.${ext}"
publish:
  provider: github
  owner: Noah1206
  repo: meld
