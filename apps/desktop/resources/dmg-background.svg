<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <rect width="660" height="400" fill="#FFFFFF"/>

  <!-- Grid pattern like landing page -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="660" height="400" fill="url(#grid)"/>

  <!-- Subtle top accent line -->
  <rect x="0" y="0" width="660" height="1" fill="#1A1A1A" opacity="0.06"/>

  <!-- "Drag to install" text -->
  <text x="330" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="13" fill="#CCC" letter-spacing="0.5">
    Drag Meld to Applications to install
  </text>

  <!-- Meld wordmark at bottom -->
  <g transform="translate(330, 375)">
    <text text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" fill="#E0E0E0" font-weight="500" letter-spacing="2">
      MELD
    </text>
  </g>
</svg>
