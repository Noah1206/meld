<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    .text {
      font-size: 42px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: white;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.6s step-end infinite;
    }

    /* Collapse animation */
    body.collapse .text {
      animation: collapse 0.6s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    body.collapse .cursor {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes collapse {
      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }
      100% {
        transform: scale(0);
        opacity: 0;
        filter: blur(8px);
      }
    }
  </style>
</head>
<body>
  <div class="text">
    <span id="typed"></span><span class="cursor"></span>
  </div>

  <script>
    const text = "Meld";
    const el = document.getElementById("typed");
    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        setTimeout(type, 120);
      } else {
        // Typing done → brief pause → collapse
        setTimeout(() => {
          document.body.classList.add("collapse");
        }, 600);
      }
    }

    // Brief delay before starting to type
    setTimeout(type, 400);
  </script>
</body>
</html>
