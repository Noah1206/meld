<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    /* 배경 그라데이션 글로우 */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: glowIn 2s ease-out 0.3s forwards;
    }
    .bg-glow-1 {
      background: radial-gradient(circle, rgba(197,184,130,0.15) 0%, transparent 70%);
      top: 30%;
      left: 40%;
      transform: translate(-50%, -50%);
    }
    .bg-glow-2 {
      background: radial-gradient(circle, rgba(100,130,255,0.08) 0%, transparent 70%);
      top: 60%;
      left: 60%;
      transform: translate(-50%, -50%);
    }

    /* 로고 */
    .logo-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 0;
      transform: scale(0.8);
      animation: logoIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: #1A1A1A;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      opacity: 0;
      animation: iconIn 0.6s ease-out 0.6s forwards;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(8px);
      animation: textIn 0.6s ease-out 0.8s forwards;
    }

    /* 로딩 바 */
    .loader {
      position: relative;
      z-index: 10;
      margin-top: 48px;
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: textIn 0.4s ease-out 1.2s forwards;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(197,184,130,0.8), rgba(197,184,130,0.4));
      border-radius: 2px;
      animation: loading 2s ease-in-out 1.4s forwards;
    }

    /* 하단 텍스트 */
    .tagline {
      position: absolute;
      bottom: 40px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: textIn 0.4s ease-out 1s forwards;
    }

    /* 페이드 아웃 */
    body.fade-out {
      animation: fadeOut 0.5s ease-in forwards;
    }

    @keyframes glowIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes iconIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes loading {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="logo-container">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="12" r="5.5" opacity="0.9"/>
        <circle cx="15" cy="12" r="5.5" opacity="0.9"/>
      </svg>
    </div>
    <span class="logo-text">Meld</span>
  </div>

  <div class="loader">
    <div class="loader-bar"></div>
  </div>

  <span class="tagline">Design to Code, seamlessly.</span>
</body>
</html>
